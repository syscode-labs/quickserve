version: 2

project_name: quickserve

before:
  hooks:
    - go mod tidy

builds:
  - id: quickserve
    main: .
    binary: quickserve
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/syscod3/quickserve/internal/app.Version={{ .Tag }} -X github.com/syscod3/quickserve/internal/app.Commit={{ .Commit }} -X github.com/syscod3/quickserve/internal/app.Date={{ .Date }}

archives:
  - id: default
    ids:
      - quickserve
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  header: |
    ## quickserve {{ .Tag }}

    Warning: `quickserve` has no TLS or authentication. If `-upnp` succeeds, served files may be reachable from the public internet.
  footer: |
    Verify downloads with `checksums.txt` and GitHub artifact attestations.
